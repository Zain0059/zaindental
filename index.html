<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0D0D0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zain Dental">
<title>Zain Dental Cloud</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#C9A84C;--gold2:#D4AF37;--bg:#111;--card:#1C1C1C;--card2:#222;
  --border:#282828;--text:#E0E0E0;--muted:#5A5A5A;--green:#34D399;
  --blue:#5B9CF6;--red:#F87171;--amber:#F59E0B;
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;outline:none}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;font-size:15px;overscroll-behavior:none}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;border:none}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}
#hdr{background:#0D0D0D;border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
#hdr-title{font-size:15px;font-weight:700;color:var(--gold)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(62px + var(--sb))}
#nav{position:fixed;bottom:0;left:0;right:0;background:#0A0A0A;border-top:1px solid var(--border);display:flex;padding-bottom:var(--sb);z-index:200}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 2px 8px;background:none;color:var(--muted);font-size:9px;font-weight:600;gap:3px;letter-spacing:.2px;transition:color .15s;min-width:0}
.nb svg{width:20px;height:20px;stroke-width:1.8;flex-shrink:0}
.nb.on{color:var(--gold)}
/* Login */
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:999}
.l-logo{font-size:52px;margin-bottom:6px}
.l-title{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:3px}
.l-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.fld{width:100%;margin-bottom:14px}
.fld label{display:block;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.fld input{width:100%;background:#1C1C1C;border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:15px;color:var(--text)}
.fld input:focus{border-color:var(--gold)}
.btn-g{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;border-radius:10px;padding:15px;font-size:15px;font-weight:700;transition:opacity .2s}
.btn-g:active{opacity:.8}
.errmsg{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}
/* Common */
.pg{padding:16px}
.pg-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px}
.card{background:var(--card);border-radius:13px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.slbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.row-sep{border-bottom:1px solid #1E1E1E}
.row-sep:last-child{border-bottom:none}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--gold))}
.sc-val{font-size:26px;font-weight:800;color:var(--ac,var(--gold));letter-spacing:-1px;line-height:1}
.sc-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;margin-top:5px}
.sc-ico{font-size:20px;margin-bottom:6px}
.ar{display:flex;align-items:center;overflow:hidden}
.ar-bar{width:3px;align-self:stretch;flex-shrink:0}
.ar-body{flex:1;padding:11px 13px;min-width:0;cursor:pointer}
.ar-time{font-size:11px;font-weight:700;font-family:'Courier New',monospace;margin-bottom:1px}
.ar-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ar-type{font-size:11px;color:var(--muted)}
.ar-act{padding:8px 10px 8px 0;display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.chip{font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;cursor:pointer;border:1px solid;white-space:nowrap;transition:opacity .15s}
.chip:active{opacity:.6}
.wa-btn{background:#25D366;border:none;border-radius:20px;padding:4px 8px;font-size:10px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;gap:3px}
.pr{display:flex;align-items:center;padding:12px 14px;gap:11px;cursor:pointer}
.pr:active{background:#181818}
.av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#A07820);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#111;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-name{font-size:13px;font-weight:600;color:var(--text)}
.pr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.pr-arr{color:var(--muted);font-size:17px}
.srch{position:relative;margin-bottom:14px}
.srch input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px 11px 40px;font-size:14px;color:var(--text)}
.srch input:focus{border-color:var(--gold);outline:none}
.srch-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.more-btn{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:20px 14px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;cursor:pointer;transition:background .15s}
.more-btn:active{background:#222}
.more-ico{font-size:26px}
.more-lbl{font-size:13px;font-weight:700;color:var(--text)}
.more-sub{font-size:11px;color:var(--muted);margin-top:1px}
.inv-row{display:flex;align-items:center;padding:12px 14px;gap:12px;cursor:pointer}
.inv-row:active{background:#181818}
.inv-num{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:2px}
.inv-name{font-size:13px;font-weight:600;color:var(--text)}
.inv-date{font-size:11px;color:var(--muted)}
.inv-amt{text-align:right;flex-shrink:0}
.inv-total{font-size:14px;font-weight:800;color:var(--text)}
.inv-status{font-size:10px;font-weight:700;letter-spacing:.4px;margin-top:2px}
.s-paid{color:var(--green)}.s-partial{color:var(--amber)}.s-unpaid{color:var(--red)}
.ff{margin-bottom:14px}
.ff label{display:block;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px}
.ff input,.ff select,.ff textarea{width:100%;background:#1C1C1C;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text)}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--gold);outline:none}
.ff select option{background:#1C1C1C}
.ff textarea{resize:vertical;min-height:70px}
.sheet{position:fixed;inset:0;background:var(--bg);z-index:500;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet.open{transform:translateX(0)}
.sh-hdr{background:#0D0D0D;padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.back{background:none;color:var(--gold);font-size:24px;line-height:1;padding:2px 8px 2px 0;border:none;cursor:pointer}
.sh-title{font-size:15px;font-weight:700;color:var(--text)}
.sh-sub{font-size:11px;color:var(--muted);margin-top:1px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px}
.ii{background:var(--card);border-radius:9px;padding:11px 13px;border:1px solid var(--border)}
.ii.full{grid-column:1/-1}
.ii-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.ii-val{font-size:13px;font-weight:600;color:var(--text)}
.badge{display:inline-block;border-radius:5px;padding:3px 9px;font-size:11px;font-weight:700;margin:2px}
.b-red{background:#F8717122;color:var(--red);border:1px solid #F8717144}
.b-gold{background:#C9A84C22;color:var(--gold);border:1px solid #C9A84C44}
.b-green{background:#34D39922;color:var(--green);border:1px solid #34D39944}
.b-blue{background:#5B9CF622;color:var(--blue);border:1px solid #5B9CF644}
.bar-wrap{padding:4px 0 8px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-label{font-size:11px;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#222;border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;min-width:4px}
.bar-val{font-size:11px;font-weight:700;color:#fff;white-space:nowrap}
#toast{position:fixed;bottom:calc(76px + var(--sb));left:50%;transform:translateX(-50%) translateY(20px);background:#1E1E1E;border:1px solid #444;color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:9999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{width:28px;height:28px;border:3px solid #2A2A2A;border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;margin:36px auto}
@keyframes sp{to{transform:rotate(360deg)}}
.ldg{display:flex;justify-content:center;padding:36px}
.empty{text-align:center;padding:44px 20px;color:var(--muted);font-size:13px}
.dt-sel{background:#1C1C1C;border:1px solid var(--border);border-radius:8px;color:var(--gold);padding:6px 10px;font-size:13px;font-weight:600}
.ref-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 10px;font-size:13px}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer}
.pill.on{background:#211B0D;color:var(--gold);border-color:var(--gold)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.small-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 12px;font-size:12px;font-weight:600}
.small-btn.gold{color:var(--gold);border-color:var(--gold);background:#211B0D}
.staff-row{display:flex;align-items:center;padding:12px 14px;gap:12px}
.staff-name{font-size:13px;font-weight:600;color:var(--text)}
.staff-meta{font-size:11px;color:var(--muted);margin-top:1px}
.role-badge{font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 8px;border-radius:20px}
.r-admin{background:#C9A84C22;color:var(--gold)}.r-dentist{background:#5B9CF622;color:var(--blue)}.r-assistant{background:#34D39922;color:var(--green)}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="l-logo">🦷</div>
  <div class="l-title">Zain Dental</div>
  <div class="l-sub">Cloud Portal</div>
  <div class="fld"><label>Username</label><input id="lu" type="text" autocapitalize="none" placeholder="Enter username"></div>
  <div class="fld"><label>Password</label><input id="lp" type="password" placeholder="Enter password"></div>
  <button class="btn-g" id="lbtn" onclick="doLogin()">Sign In</button>
  <div class="errmsg" id="lerr"></div>
</div>

<!-- App Shell -->
<div id="app" style="display:none">
  <div id="hdr">
    <span id="hdr-title">🦷 Zain Dental</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="hdr-user" style="font-size:11px;color:var(--muted)"></span>
      <button onclick="doLogout()" style="background:none;border:1px solid #333;border-radius:7px;color:#777;padding:4px 8px;font-size:11px">Out</button>
    </div>
  </div>
  <div id="content">

    <!-- SCHEDULE -->
    <div id="t-sched" class="pg" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="pg-title" style="margin-bottom:0">Schedule</div>
        <div style="display:flex;gap:7px;align-items:center">
          <input type="date" class="dt-sel" id="sched-dt" onchange="loadSched()">
          <button class="ref-btn" onclick="loadSched()">↻</button>
        </div>
      </div>
      <div id="sched-list"><div class="ldg"><div class="spin"></div></div></div>
      <button class="btn-g" style="border-radius:12px;padding:15px;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px" onclick="openSheet('new-appt')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Appointment
      </button>
    </div>

    <!-- QUEUE -->
    <div id="t-queue" class="pg" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="pg-title" style="margin-bottom:0">Live Queue</div>
        <button class="ref-btn" onclick="loadQueue()">↻</button>
      </div>
      <div id="queue-body"><div class="ldg"><div class="spin"></div></div></div>
    </div>

    <!-- PATIENTS -->
    <div id="t-patients" class="pg" style="display:none">
      <div class="pg-title">Patients</div>
      <div class="srch">
        <span class="srch-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="17" height="17"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input id="pat-q" type="search" placeholder="Name, phone, ID…" oninput="searchPats(this.value)">
      </div>
      <div id="pat-list"><div class="empty">Type to search</div></div>
    </div>

    <!-- BILLING -->
    <div id="t-billing" class="pg" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="pg-title" style="margin-bottom:0">Billing</div>
        <button class="small-btn gold" onclick="openSheet('inv-new')">+ New Invoice</button>
      </div>
      <div class="pill-row">
        <div class="pill on" data-ifilter="all" onclick="setIFilter('all',this)">All</div>
        <div class="pill" data-ifilter="unpaid" onclick="setIFilter('unpaid',this)">Unpaid</div>
        <div class="pill" data-ifilter="partial" onclick="setIFilter('partial',this)">Partial</div>
        <div class="pill" data-ifilter="paid" onclick="setIFilter('paid',this)">Paid</div>
      </div>
      <div id="inv-list"><div class="ldg"><div class="spin"></div></div></div>
    </div>

    <!-- CLINICAL -->
    <div id="t-clinical" class="pg" style="display:none">
      <div class="pg-title">Clinical</div>
      <div class="srch"><span class="srch-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="17" height="17"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input id="cl-q" type="search" placeholder="Search patient…" oninput="srchCL(this.value)">
      </div>
      <div id="cl-pres" style="background:#1C1C1C;border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none;margin-bottom:10px"></div>
      <div id="cl-body"><div class="empty">Search for a patient</div></div>
    </div>

    <!-- MORE -->
    <div id="t-more" class="pg" style="display:none">
      <div class="pg-title">More</div>
      <div class="more-grid">
        <button class="more-btn" onclick="openSheet('reports')">
          <div class="more-ico">📊</div>
          <div><div class="more-lbl">Reports</div><div class="more-sub">Revenue & stats</div></div>
        </button>
        <button class="more-btn" onclick="openSheet('staff')">
          <div class="more-ico">👥</div>
          <div><div class="more-lbl">Staff</div><div class="more-sub">Team members</div></div>
        </button>
        <button class="more-btn" onclick="openSheet('new-patient')">
          <div class="more-ico">➕</div>
          <div><div class="more-lbl">New Patient</div><div class="more-sub">Add profile</div></div>
        </button>
        <button class="more-btn" onclick="openSheet('whatsapp-list')">
          <div class="more-ico">💬</div>
          <div><div class="more-lbl">WhatsApp List</div><div class="more-sub">Send appointments</div></div>
        </button>
      </div>
    </div>

  </div><!-- /content -->

  <nav id="nav">
    <button class="nb" data-t="sched" onclick="sw('sched')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Schedule</button>
    <button class="nb" data-t="queue" onclick="sw('queue')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Queue</button>
    <button class="nb" data-t="patients" onclick="sw('patients')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>Patients</button>
    <button class="nb" data-t="billing" onclick="sw('billing')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>Billing</button>
    <button class="nb" data-t="clinical" onclick="sw('clinical')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a5 5 0 0 1 5 5c0 3-2 5.5-5 7-3-1.5-5-4-5-7a5 5 0 0 1 5-5z"/><path d="M12 22v-8M9 17h6"/></svg>Clinical</button>
    <button class="nb" data-t="more" onclick="sw('more')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>More</button>
  </nav>
</div>

<!-- ═══ SHEETS ═══ -->

<!-- Patient detail -->
<div class="sheet" id="sh-patient">
  <div class="sh-hdr"><button class="back" onclick="closeSheet('patient')">‹</button>
    <div style="flex:1"><div id="sh-pat-name" class="sh-title"></div><div id="sh-pat-num" class="sh-sub"></div></div>
  </div>
  <div id="sh-pat-body" style="padding-bottom:40px"></div>
</div>

<!-- Invoice detail -->
<div class="sheet" id="sh-inv">
  <div class="sh-hdr"><button class="back" onclick="closeSheet('inv')">‹</button>
    <div><div id="sh-inv-title" class="sh-title">Invoice</div><div id="sh-inv-sub" class="sh-sub"></div></div>
  </div>
  <div id="sh-inv-body" style="padding-bottom:40px"></div>
</div>

<!-- New Invoice -->
<div class="sheet" id="sh-inv-new">
  <div class="sh-hdr"><button class="back" onclick="closeSheet('inv-new')">‹</button>
    <div class="sh-title">New Invoice</div>
  </div>
  <div class="pg" style="padding-bottom:40px">
    <div class="ff">
      <label>Patient</label>
      <div class="srch" style="margin-bottom:4px">
        <span class="srch-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="17" height="17"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input id="ni-psrch" type="search" placeholder="Search patient…" oninput="srchNI(this.value)">
      </div>
      <div id="ni-pres" style="background:#1C1C1C;border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none;margin-bottom:4px"></div>
      <div id="ni-psel" style="background:#211B0D;border:1px solid var(--gold);border-radius:9px;padding:10px 13px;display:none">
        <div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px">Selected</div>
        <div id="ni-pname" style="font-weight:700;font-size:13px"></div>
      </div>
    </div>
    <div class="ff"><label>Notes</label><textarea id="ni-notes" placeholder="Optional notes…"></textarea></div>
    <div id="ni-items" style="margin-bottom:14px">
      <div class="sec-hdr"><div class="slbl" style="margin:0">Line Items</div><button class="small-btn gold" onclick="addNIItem()">+ Add Item</button></div>
      <div id="ni-item-rows"></div>
    </div>
    <div style="background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:16px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:13px;color:var(--muted);font-weight:600">Total</div>
      <div id="ni-total" style="font-size:20px;font-weight:800;color:var(--gold)">$0.00</div>
    </div>

// ── SHA256 (pure JS — works on file:// and http://) ──────────────────────────
async function sha256(msg){
  function rightRotate(v,a){return(v>>>a)|(v<<(32-a));}
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const bytes=new TextEncoder().encode(msg);
  const bits=bytes.length*8;
  const extra=((bytes.length+9)%64===0)?0:64-((bytes.length+9)%64);
  const padded=new Uint8Array(bytes.length+1+extra+8);
  padded.set(bytes);padded[bytes.length]=0x80;
  const dv=new DataView(padded.buffer);
  dv.setUint32(padded.length-4,bits,false);
  for(let offset=0;offset<padded.length;offset+=64){
    const W=new Array(64);
    for(let i=0;i<16;i++)W[i]=dv.getUint32(offset+i*4,false);
    for(let i=16;i<64;i++){const s0=(rightRotate(W[i-15],7)^rightRotate(W[i-15],18)^(W[i-15]>>>3))>>>0;const s1=(rightRotate(W[i-2],17)^rightRotate(W[i-2],19)^(W[i-2]>>>10))>>>0;W[i]=(W[i-16]+s0+W[i-7]+s1)>>>0;}
    let [a,b,c,d,e,f,g,h]=H;
    for(let i=0;i<64;i++){const S1=(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))>>>0;const ch=((e&f)^(~e&g))>>>0;const t1=(h+S1+ch+K[i]+W[i])>>>0;const S0=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))>>>0;const maj=((a&b)^(a&c)^(b&c))>>>0;const t2=(S0+maj)>>>0;h=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0;}
    H=[H[0]+a,H[1]+b,H[2]+c,H[3]+d,H[4]+e,H[5]+f,H[6]+g,H[7]+h].map(v=>v>>>0);
  }
  return H.map(v=>v.toString(16).padStart(8,"0")).join("");
}

let _allInvoices=[];

    <div class="row-sep" style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center">

    </div>`).join(""):'<div class="empty" style="padding:16px">No items</div>';
  const pmtsHtml=pmts?.length?pmts.map(p=>`
    <div class="row-sep" style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:13px;font-weight:600;color:var(--green)">SAR ${p.amount}</div>

  document.getElementById("sh-inv-body").innerHTML=`
    <div class="ig">
      <div class="ii full" style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="ii-lbl">Status</div><span class="badge ${sc}">${(inv.status||"").toUpperCase()}</span></div>
        <div style="text-align:right"><div class="ii-lbl">Total</div><div style="font-size:20px;font-weight:800;color:var(--gold)">SAR ${(+inv.total_amount||0).toFixed(2)}</div></div>
      </div>
      <div class="ii"><div class="ii-lbl">Paid</div><div class="ii-val" style="color:var(--green)">SAR ${(+inv.paid_amount||0).toFixed(2)}</div></div>
      <div class="ii"><div class="ii-lbl">Remaining</div><div class="ii-val" style="color:${remaining>0?"var(--red)":"var(--green)"}">SAR ${remaining.toFixed(2)}</div></div>
      ${inv.notes?`<div class="ii full"><div class="ii-lbl">Notes</div><div class="ii-val" style="font-size:12px;font-weight:400">${esc(inv.notes)}</div></div>`:""}

      <div class="ff"><label>Method</label><select id="pay-meth"><option value="cash">Cash</option><option value="card">Card</option><option value="bank_transfer">Bank Transfer</option><option value="insurance">Insurance</option></select></div>

async function recordPayment(invId){
  const amt=parseFloat(document.getElementById("pay-amt")?.value||0);
  const meth=document.getElementById("pay-meth")?.value||"cash";
  if(!amt||amt<=0){toast("Invalid amount ✗");return}
  const {error}=await sb.from("payments").insert({invoice_id:invId,amount:amt,payment_method:meth,payment_date:today(),received_by:USER?.full_name||""});
  if(!error){toast("Payment recorded ✓");openInv(invId);loadInvoices();}else toast("Failed ✗");
}

function niProcSel(idx,sel){
  const opt=sel.options[sel.selectedIndex];
  if(!opt.value||opt.value==="custom")return;
  document.getElementById("ni-desc-"+idx).value=opt.dataset.name||"";
  document.getElementById("ni-price-"+idx).value=opt.dataset.cost||0;
  niCalc(idx);
}
function removeNIItem(idx){const el=document.getElementById("ni-item-"+idx);if(el){el.remove();delete _niItems[idx];niTotalCalc();}}
function niCalc(idx){
  const qty=parseFloat(document.getElementById("ni-qty-"+idx)?.value||1);
  const price=parseFloat(document.getElementById("ni-price-"+idx)?.value||0);
  const desc=document.getElementById("ni-desc-"+idx)?.value||"";
  _niItems[idx]={description:desc,quantity:qty,unit_price:price,total_price:qty*price};
  niTotalCalc();
}
function niTotalCalc(){
  const tot=_niItems.filter(Boolean).reduce((s,i)=>s+(i.total_price||0),0);
  document.getElementById("ni-total").textContent="SAR "+tot.toFixed(2);
}

async function submitInvoice(){
  if(!_niPatId){toast("Select a patient ✗");return}
  const items=_niItems.filter(i=>i&&i.description&&i.total_price>0);
  if(!items.length){toast("Add at least one item ✗");return}
  const total=items.reduce((s,i)=>s+i.total_price,0);
  // Get patient name
  const {data:pat}=await sb.from("patients").select("first_name,last_name").eq("id",_niPatId).single();
  const pname=pat?`${pat.first_name} ${pat.last_name}`:"";
  const {data:inv,error}=await sb.from("invoices").insert({
    patient_id:_niPatId,patient_name:pname,total_amount:total,
    notes:document.getElementById("ni-notes").value,issue_date:today(),created_by:USER?.full_name||""
  }).select().single();
  if(error){toast("Failed: "+error.message+" ✗");return}
  // Insert items
  await sb.from("invoice_items").insert(items.map(it=>({...it,invoice_id:inv.id})));
  toast("Invoice created ✓");closeSheet("inv-new");
  _niPatId=null;_niItems=[];
  document.getElementById("ni-psel").style.display="none";
  document.getElementById("ni-notes").value="";
  document.getElementById("ni-item-rows").innerHTML="";
  document.getElementById("ni-total").textContent="SAR 0.00";
  loadInvoices();
}

        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(t.procedure_name)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${t.date_performed||""}${t.tooth_number?" · Tooth "+t.tooth_number:""}${t.dentist_name?" · "+esc(t.dentist_name):""}</div>
          ${t.diagnosis?`<div style="font-size:11px;color:#888;margin-top:2px">${esc(t.diagnosis)}</div>`:""}
        </div>
        <div style="font-size:13px;font-weight:700;color:var(--gold);padding-left:10px">SAR ${t.cost||0}</div>
      </div>
    </div>`).join(""):'<div class="empty">No treatments</div>';
  el.innerHTML=`
    <div style="background:#211B0D;border:1px solid var(--gold);border-radius:10px;padding:11px 14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--gold)">${esc(pat?.first_name||"")} ${esc(pat?.last_name||"")}</div>
      ${pat?.allergies?`<div style="font-size:11px;color:var(--red);margin-top:2px">⚠ ${esc(pat.allergies)}</div>`:""}
    </div>
    <div class="sec-hdr"><div class="slbl" style="margin:0">Treatment History</div><button class="small-btn gold" onclick="openAddTx()">+ Add</button></div>
    <div class="card" style="margin-bottom:14px">${txHtml}</div>
    <div id="cl-add-form" style="display:none">
      <div class="slbl">New Treatment</div>
      <div class="ff"><label>Procedure</label>
        <select id="cl-proc" onchange="clProcSel(this)" style="width:100%;background:#1C1C1C;border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--text);margin-bottom:6px">
          <option value="">— Select —</option>
          ${_procs.map(p=>`<option value="${p.id}" data-name="${esc(p.name)}" data-cost="${p.default_cost}">${esc(p.name)}</option>`).join("")}
          <option value="custom">Custom…</option>
        </select>
        <input id="cl-proc-name" type="text" placeholder="Procedure name" style="width:100%;background:#1C1C1C;border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--text)">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <div class="ff" style="margin:0"><label>Tooth #</label><input id="cl-tooth" type="number" placeholder="FDI #" style="width:100%;background:#1C1C1C;border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--text)"></div>
        <div class="ff" style="margin:0"><label>Cost (SAR)</label><input id="cl-cost" type="number" step="0.01" min="0" value="0" style="width:100%;background:#1C1C1C;border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--text)"></div>
      </div>
      <div class="ff"><label>Diagnosis / Notes</label><textarea id="cl-notes" style="width:100%;background:#1C1C1C;border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--text);resize:vertical;min-height:60px"></textarea></div>
      <button class="btn-g" style="border-radius:10px;padding:13px" onclick="submitTx()">Save Treatment</button>
    </div>`;
}
function openAddTx(){const f=document.getElementById("cl-add-form");f.style.display=f.style.display==="none"?"block":"none";}
function clProcSel(sel){const opt=sel.options[sel.selectedIndex];if(opt.value&&opt.value!=="custom"){document.getElementById("cl-proc-name").value=opt.dataset.name||"";document.getElementById("cl-cost").value=opt.dataset.cost||0;}}
async function submitTx(){
  if(!_clPatId){toast("No patient ✗");return}
  const name=document.getElementById("cl-proc-name").value.trim();
  if(!name){toast("Enter procedure name ✗");return}
  const cost=parseFloat(document.getElementById("cl-cost").value)||0;
  const {error}=await sb.from("treatments").insert({
    patient_id:_clPatId,procedure_name:name,
    tooth_number:document.getElementById("cl-tooth").value||null,
    cost,diagnosis:document.getElementById("cl-notes").value,
    date_performed:today(),dentist_name:USER?.full_name||""
  });
  if(!error){
    toast("Treatment saved — creating invoice…");
    loadCLPat(_clPatId,document.getElementById("cl-q").value);
    const {data:pat}=await sb.from("patients").select("first_name,last_name").eq("id",_clPatId).single();
    const pname=pat?`${pat.first_name} ${pat.last_name}`:"";
    const {data:inv}=await sb.from("invoices").insert({
      patient_id:_clPatId,patient_name:pname,total_amount:cost,issue_date:today(),
      created_by:USER?.full_name||""
    }).select().single();
    if(inv){
      await sb.from("invoice_items").insert({invoice_id:inv.id,description:name,quantity:1,unit_price:cost,total_price:cost});
      loadInvoices();openInv(inv.id);
    }
  }else toast("Failed ✗");
}

// ── REPORTS ───────────────────────────────────────────────────────────────────
async function loadReports(){
  const el=document.getElementById("sh-rep-body");
  el.innerHTML='<div class="ldg"><div class="spin"></div></div>';
  const td=today();
  const startYear=td.slice(0,4)+"-01-01";
  const startMonth=td.slice(0,7)+"-01";
  const [{data:invs},{data:appts},{data:txs},{count:totalPats}]=await Promise.all([
    sb.from("invoices").select("total_amount,paid_amount,issue_date,status").gte("issue_date",startYear),
    sb.from("appointments").select("status").gte("appointment_date",startYear),
    sb.from("treatments").select("procedure_name,cost").gte("date_performed",startYear),
    sb.from("patients").select("*",{count:"exact",head:true})
  ]);
  const rev=new Array(12).fill(0);
  (invs||[]).forEach(i=>{const m=new Date(i.issue_date).getMonth();if(m>=0&&m<12)rev[m]+=(+i.total_amount||0);});
  const maxR=Math.max(...rev,1);
  const revBars=rev.map((v,i)=>`<div class="bar-row">
    <div class="bar-label">${MONTHS[i]}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxR*100)}%;background:linear-gradient(90deg,#B8960C,#D4AF37)">
      ${v>0?`<span class="bar-val">SAR ${v.toLocaleString(undefined,{maximumFractionDigits:0})}</span>`:""}
    </div></div>
  </div>`).join("");
  const byStatus={};(appts||[]).forEach(a=>{byStatus[a.status]=(byStatus[a.status]||0)+1});
  const apptBars=Object.entries(byStatus).map(([s,c])=>`<div class="bar-row">
    <div class="bar-label" style="width:60px;text-align:right;font-size:10px;color:${SC[s]||"#888"}">${SL[s]||s}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/Math.max(...Object.values(byStatus),1)*100)}%;background:${SC[s]||"#888"}">
      <span class="bar-val">${c}</span>
    </div></div>
  </div>`).join("");
  const procMap={};(txs||[]).forEach(t=>{if(!procMap[t.procedure_name])procMap[t.procedure_name]={cnt:0,rev:0};procMap[t.procedure_name].cnt++;procMap[t.procedure_name].rev+=(+t.cost||0);});
  const topProcs=Object.entries(procMap).sort((a,b)=>b[1].cnt-a[1].cnt).slice(0,8);
  const maxP=Math.max(...topProcs.map(([,v])=>v.cnt),1);
  const procBars=topProcs.map(([name,v])=>`<div class="bar-row">
    <div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px">
      <span>${esc(name)}</span><span style="color:var(--gold)">${v.cnt}× · SAR ${v.rev.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
    </div><div class="bar-track" style="height:14px"><div class="bar-fill" style="width:${Math.round(v.cnt/maxP*100)}%;background:linear-gradient(90deg,#1D4A3A,#34D399)"></div></div></div>
  </div>`).join("");
  const totalYear=rev.reduce((a,b)=>a+b,0);
  const outstanding=(invs||[]).filter(i=>i.status!=="paid").reduce((s,i)=>s+Math.max(0,(+i.total_amount||0)-(+i.paid_amount||0)),0);
  const {count:newPats}=await sb.from("patients").select("*",{count:"exact",head:true}).gte("created_at",startMonth);
  el.innerHTML=`
    <div class="sg">
      <div class="sc" style="--ac:#C9A84C"><div class="sc-ico">💰</div><div class="sc-val">SAR ${(totalYear||0).toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sc-lbl">${td.slice(0,4)} Revenue</div></div>
      <div class="sc" style="--ac:#F87171"><div class="sc-ico">⚠</div><div class="sc-val">SAR ${(outstanding||0).toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sc-lbl">Outstanding</div></div>
      <div class="sc" style="--ac:#34D399"><div class="sc-ico">✨</div><div class="sc-val">${newPats||0}</div><div class="sc-lbl">New Patients</div></div>
      <div class="sc" style="--ac:#5B9CF6"><div class="sc-ico">👥</div><div class="sc-val">${totalPats||0}</div><div class="sc-lbl">Total Patients</div></div>
    </div>
    <div class="slbl">Monthly Revenue — ${td.slice(0,4)}</div>
    <div class="card" style="padding:14px"><div class="bar-wrap">${revBars}</div></div>
    <div class="slbl">Appointments by Status</div>
    <div class="card" style="padding:14px"><div class="bar-wrap">${apptBars||'<div class="empty">No data</div>'}</div></div>
    <div class="slbl">Top Procedures</div>
    <div class="card" style="padding:14px"><div class="bar-wrap">${procBars||'<div class="empty">No data</div>'}</div></div>`;
}

// ── STAFF ─────────────────────────────────────────────────────────────────────
async function loadStaff(){
  const el=document.getElementById("sh-staff-body");
  el.innerHTML='<div class="ldg"><div class="spin"></div></div>';
  const {data}=await sb.from("staff").select("*").order("full_name");
  if(!data){el.innerHTML='<div class="empty">Failed</div>';return}
  const roleCol={admin:"r-admin",dentist:"r-dentist",assistant:"r-assistant"};
  el.innerHTML=`<div class="card">
    ${data.map(s=>`<div class="staff-row row-sep">
      <div class="av">${(s.full_name||"?")[0].toUpperCase()}</div>
      <div style="flex:1"><div class="staff-name">${esc(s.full_name)}</div><div class="staff-meta">${esc(s.username||"")}${s.phone?" · "+esc(s.phone):""}</div></div>
      <div><span class="role-badge ${roleCol[s.role]||""}">${(s.role||"").toUpperCase()}</span>
      <div style="font-size:10px;color:${s.is_active?"var(--green)":"var(--red)"};text-align:center;margin-top:3px;font-weight:600">${s.is_active?"Active":"Inactive"}</div></div>
    </div>`).join("")}

}

// ── WHATSAPP LIST ─────────────────────────────────────────────────────────────
async function loadWAList(){
  const dt=document.getElementById("wa-date").value;
  const el=document.getElementById("wa-list");
  el.innerHTML='<div class="ldg"><div class="spin"></div></div>';
  const {data}=await sb.from("appointments")
    .select("*,patients(first_name,last_name,phone)")
    .eq("appointment_date",dt)
    .in("status",["scheduled","confirmed"])
    .order("appointment_time");
  if(!data?.length){el.innerHTML='<div class="empty">No upcoming appointments for this day</div>';return}
  el.innerHTML=`
    <div style="margin-bottom:12px">
      <button onclick="sendAllWA(${JSON.stringify(data).replace(/"/g,"&quot;")})" style="width:100%;background:linear-gradient(135deg,#128C7E,#25D366);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;cursor:pointer">
        📤 Send All (${data.length}) via WhatsApp
      </button>
    </div>
    <div class="card">${data.map(a=>{
      const pname=a.patients?`${a.patients.first_name} ${a.patients.last_name}`:a.patient_name||"Unknown";
      const phone=a.patients?.phone||"";
      const t=(a.appointment_time||"").slice(0,5);
      const msg=encodeURIComponent(`Hello ${pname}, this is a reminder for your appointment at Zain Dental Clinic on ${a.appointment_date} at ${t}. We look forward to seeing you. 🦷`);
      return `<div class="pr row-sep" style="flex-direction:column;align-items:stretch;padding:12px 14px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="av" style="width:32px;height:32px;font-size:12px">${(pname[0]||"?").toUpperCase()}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(pname)}</div>
            <div style="font-size:11px;color:var(--muted)">${t} · ${esc(a.appt_type||"General")}${phone?" · "+esc(phone):""}</div>
          </div>
          ${phone?`<button class="wa-btn" style="padding:7px 12px;font-size:11px" onclick="window.open('https://wa.me/${phone.replace(/\D/g,"").replace(/^0/,"966")}?text=${msg}','_blank')">
            Send 💬
          </button>`:`<span style="font-size:11px;color:var(--red)">No phone</span>`}
        </div>
      </div>`;
    }).join("")}</div>`;
}

async function sendAllWA(appts){
  let sent=0;
  for(const a of appts){
    const phone=(a.patients?.phone||"").replace(/\D/g,"").replace(/^0/,"966");
    if(!phone) continue;
    const pname=a.patients?`${a.patients.first_name} ${a.patients.last_name}`:a.patient_name||"";
    const t=(a.appointment_time||"").slice(0,5);
    const msg=encodeURIComponent(`Hello ${pname}, this is a reminder for your appointment at Zain Dental Clinic on ${a.appointment_date} at ${t}. We look forward to seeing you. 🦷`);
    window.open("https://wa.me/"+phone+"?text="+msg,"_blank");
    sent++;
    await new Promise(r=>setTimeout(r,800));
  }
  toast(`Sent ${sent} WhatsApp messages ✓`);
}

async function loadProcs(){
  const {data}=await sb.from("procedures_catalog").select("*").order("name");
  if(data) _procs=data;
}
